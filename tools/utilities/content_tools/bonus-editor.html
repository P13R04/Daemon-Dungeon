<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bonus Editor</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="title">
        <h1>Bonus Editor</h1>
        <p>One file per bonus + optional aggregate JSON for backward compatibility.</p>
      </div>
      <nav class="nav-links">
        <a href="./index.html">Tools Home</a>
        <a href="../tiles_mapping/index.html">Room Editor</a>
        <a href="./achievement-editor.html">Achievement Editor</a>
      </nav>
    </header>

    <section class="panel" style="margin-bottom: 14px;">
      <div class="actions">
        <button class="btn" id="selectFolderBtn">Select src/data/items/entries</button>
        <button class="btn primary" id="saveBtn">Save Bonus File</button>
        <button class="btn" id="downloadBtn">Download Bonus File</button>
        <button class="btn" id="addBatchBtn">Add To Batch</button>
        <button class="btn" id="downloadAggregateBtn">Download items.json Aggregate</button>
      </div>
      <div class="status" id="statusBox">No folder selected.</div>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Bonus Core</h2>
        <div class="row">
          <div class="field">
            <label>Name</label>
            <input id="name" value="Damage Overflow" />
          </div>
          <div class="field">
            <label>ID</label>
            <input id="id" value="bonus_damage_overflow" />
          </div>
        </div>

        <div class="field">
          <label>Description</label>
          <textarea id="description">+10% damage while preserving compatibility with legacy format.</textarea>
        </div>

        <div class="row">
          <div class="field">
            <label>Class Restriction</label>
            <select id="classRestriction">
              <option value="any">Any</option>
              <option value="mage">Mage</option>
              <option value="firewall">Firewall</option>
              <option value="rogue">Rogue</option>
            </select>
          </div>
          <div class="field">
            <label>Rarity</label>
            <select id="rarity">
              <option value="common">Common</option>
              <option value="rare">Rare</option>
              <option value="epic">Epic</option>
              <option value="legendary">Legendary</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Visual Token</label>
            <input id="visual" placeholder="icon id, sprite key, or emoji" value="chip_damage" />
          </div>
          <div class="field">
            <label>Bonus Type</label>
            <select id="bonusType">
              <option value="stat">stat</option>
              <option value="modifier">modifier</option>
              <option value="passive">passive</option>
              <option value="proc">proc</option>
              <option value="custom">custom</option>
            </select>
          </div>
        </div>

        <div class="field inline">
          <input id="stackable" type="checkbox" checked />
          <label for="stackable">Stackable</label>
        </div>
      </article>

      <article class="panel">
        <h2>Effect Setup</h2>
        <div class="row">
          <div class="field">
            <label>Effect Stat / Target</label>
            <input id="effectStat" value="damage" />
          </div>
          <div class="field">
            <label>Value Type</label>
            <select id="valueType">
              <option value="multiplier">multiplier</option>
              <option value="additive">additive</option>
              <option value="flat">flat</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Value</label>
            <input id="effectValue" type="number" step="0.01" value="0.1" />
          </div>
          <div class="field">
            <label>Proc Chance (0..1)</label>
            <input id="procChance" type="number" step="0.01" min="0" max="1" value="0" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Cooldown (seconds)</label>
            <input id="cooldownSeconds" type="number" step="0.1" min="0" value="0" />
          </div>
          <div class="field">
            <label>Condition Logic</label>
            <select id="conditionLogic">
              <option value="AND">AND</option>
              <option value="OR">OR</option>
            </select>
          </div>
        </div>

        <h2>Conditions</h2>
        <div class="actions" style="margin-bottom: 8px;">
          <button class="btn" id="addConditionBtn">Add Condition</button>
        </div>
        <div id="conditionsList" class="list"></div>

        <h2>Extra Effect Fields</h2>
        <div class="actions" style="margin-bottom: 8px;">
          <button class="btn" id="addExtraBtn">Add Extra Field</button>
        </div>
        <div id="extraList" class="list"></div>
      </article>

      <article class="panel" style="grid-column: 1 / -1;">
        <h2>Batch + Output</h2>
        <div class="field">
          <label>Bonuses in current batch</label>
          <textarea id="batchPreview" class="output" readonly></textarea>
        </div>
        <div class="field">
          <label>Current bonus JSON preview</label>
          <textarea id="jsonPreview" class="output" readonly></textarea>
        </div>
      </article>
    </section>
  </div>

  <script type="module" src="./bonus-editor.js"></script>
</body>
</html>
