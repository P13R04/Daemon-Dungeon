<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preload" href="/font/8bit_wonder/8bit_wonder.ttf" as="font" type="font/ttf" crossorigin>
    <title>Daemon Dungeon</title>
    <style>
        @font-face {
            font-family: 'Wonder8Bit';
            src: url('/font/8bit_wonder/8bit_wonder.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        #loading {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #E0E7FF;
        }

        #loading::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(10, 20, 80, 0.4), transparent 50%),
                radial-gradient(circle at 80% 65%, rgba(0, 30, 100, 0.35), transparent 50%),
                linear-gradient(180deg, rgba(2, 4, 12, 0.99), rgba(0, 0, 0, 1));
        }

        #loadingPanel {
            position: relative;
            width: min(620px, 92vw);
            padding: 28px 26px 24px;
            border: 1px solid rgba(0, 229, 255, 0.6);
            box-shadow: 0 0 35px rgba(0, 229, 255, 0.15), inset 0 0 40px rgba(0, 150, 255, 0.2);
            background: rgba(3, 3, 7, 0.92);
            backdrop-filter: blur(4px);
            text-align: left;
        }

        #loadingTitle {
            color: #00E5FF;
            font-size: 20px;
            letter-spacing: 0.12em;
            margin-bottom: 8px;
        }

        #loadingLabel {
            color: #FF143C;
            font-size: 14px;
            letter-spacing: 0.06em;
            margin-bottom: 12px;
            min-height: 18px;
        }

        #loadingBarTrack {
            width: 100%;
            height: 12px;
            border: 1px solid rgba(100, 30, 150, 0.4);
            background: rgba(5, 5, 15, 0.9);
            overflow: hidden;
        }

        #loadingBarFill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #9D00FF, #00E5FF);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            transition: width 160ms linear;
        }

        #loadingProgress {
            margin-top: 10px;
            color: #E0E7FF;
            font-size: 13px;
            letter-spacing: 0.12em;
            text-align: right;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="loading">
        <div id="loadingPanel">
            <h2 id="loadingTitle">DAEMON DUNGEON // BOOT</h2>
            <p id="loadingLabel">LOADING SYSTEM...</p>
            <div id="loadingBarTrack">
                <div id="loadingBarFill"></div>
            </div>
            <p id="loadingProgress">0%</p>
        </div>
    </div>
    
    <!-- Force font load -->
    <div style="font-family: 'Wonder8Bit'; position: absolute; opacity: 0; pointer-events: none;">.</div>

    <script type="module" src="./src/main.ts"></script>
</body>
</html>
